<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco de Imagenes Taka</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  min-height: 100vh;
  transition: 0.3s;
}

/* Overlay elegante */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
  z-index: -1;
}

@media (max-width: 768px) {
  body {
    background-attachment: scroll;
  }
}

.dark {
  background: linear-gradient(135deg, #1f2937, #111827);
  color: white;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.logo {
  font-weight: bold;
  font-size: 20px;
  color: white;
}

.toggle {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.95);
  padding: 10px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  cursor: pointer;
  transition: 0.2s;
}

.dark .card {
  background: #1f2937;
  color: white;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  border-radius: 6px;
}

.card p {
  text-align: center;
  font-size: 14px;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.modal img {
  max-width: 90%;
  max-height: 70%;
  border-radius: 10px;
  margin-bottom: 15px;
}

.navegacion {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  margin-bottom: 15px;
  color: white;
  flex-wrap: wrap;
}

.navegacion button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

.botones {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.botones button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

.whatsapp { background: #25D366; color: white; }
.copiar { background: #007BFF; color: white; }
.descargar { background: #6c757d; color: white; }

.cerrar {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 30px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🔧 Banco de imagenes Swagelok</div>
  <button class="toggle" onclick="toggleModo()">🌙</button>
</div>

<input type="text" id="busqueda" placeholder="Buscar regulador...">

<div class="grid" id="resultados"></div>

<div class="modal" id="modal">
  <span class="cerrar" onclick="cerrarModal()">✖</span>

  <img id="imagenGrande">

  <div class="navegacion">
    <button onclick="anteriorImagen()">⬅</button>
    <span id="contadorImagen">1 / 1</span>
    <button onclick="siguienteImagen()">➡</button>
  </div>

  <div class="botones">
    <button class="whatsapp" onclick="compartirWhatsapp()">WhatsApp</button>
    <button class="copiar" onclick="copiarImagen()">Copiar</button>
    <button class="descargar" onclick="descargarImagen()">Descargar</button>
  </div>
</div>

<script>
// 🔥 FONDOS ALEATORIOS
const fondos = [
  "imagenes/fondo1.jpg",
  "imagenes/fondo2.jpg",
  "imagenes/fondo3.jpg",
  "imagenes/fondo4.jpg",
  "imagenes/fondo5.jpg"
];

function cambiarFondoAleatorio() {
  const i = Math.floor(Math.random() * fondos.length);
  document.body.style.backgroundImage = `url('${fondos[i]}')`;
}

// VARIABLES
let imagenActual = "";
let productoActual = null;
let indiceImagenActual = 0;

// DATOS
const datos = [
{
  nombre: "Regulador KPR Simple",
  tags: "regulador simple",
  imagenes: ["imagenes/regulador-simple.jpg"]
},
{
  nombre: "Regulador KPR 1 Manómetro",
  tags: "regulador 1 manometro",
  imagenes: [
    "imagenes/regulador-1-manometro.jpg",
    "imagenes/regulador-1-manometro-2.jpg"
  ]
},
{
  nombre: "Regulador KPR 2 Manómetros",
  tags: "regulador doble",
  imagenes: ["imagenes/regulador-2-manometros.jpg"]
}
];

// FUNCIONES
function mostrarResultados(filtro = "") {
  const contenedor = document.getElementById("resultados");
  contenedor.innerHTML = "";

  const resultados = datos.filter(item =>
    (item.nombre + item.tags).toLowerCase().includes(filtro.toLowerCase())
  );

  resultados.forEach((item, i) => {
    contenedor.innerHTML += `
      <div class="card" onclick="abrirModal(${i})">
        <img src="${item.imagenes[0]}">
        <p>${item.nombre}</p>
      </div>
    `;
  });
}

function abrirModal(i) {
  productoActual = datos[i];
  indiceImagenActual = 0;
  imagenActual = productoActual.imagenes[0];

  document.getElementById("modal").style.display = "flex";
  document.getElementById("imagenGrande").src = imagenActual;
  actualizarContador();
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

function siguienteImagen() {
  indiceImagenActual = (indiceImagenActual + 1) % productoActual.imagenes.length;
  imagenActual = productoActual.imagenes[indiceImagenActual];
  document.getElementById("imagenGrande").src = imagenActual;
  actualizarContador();
}

function anteriorImagen() {
  indiceImagenActual = (indiceImagenActual - 1 + productoActual.imagenes.length) % productoActual.imagenes.length;
  imagenActual = productoActual.imagenes[indiceImagenActual];
  document.getElementById("imagenGrande").src = imagenActual;
  actualizarContador();
}

function actualizarContador() {
  document.getElementById("contadorImagen").textContent =
    `${indiceImagenActual + 1} / ${productoActual.imagenes.length}`;
}

function copiarImagen() {
  navigator.clipboard.writeText(imagenActual);
  alert("Link copiado");
}

function descargarImagen() {
  const a = document.createElement("a");
  a.href = imagenActual;
  a.download = "";
  a.click();
}

function compartirWhatsapp() {
  window.open(`https://wa.me/?text=${imagenActual}`);
}

function toggleModo() {
  document.body.classList.toggle("dark");
}

// EVENTOS
document.getElementById("busqueda").addEventListener("input", e => {
  mostrarResultados(e.target.value);
});

// INICIO
cambiarFondoAleatorio();
mostrarResultados();
</script>

</body>
</html>
